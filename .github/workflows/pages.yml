# GitHub Pages — site estático na raiz do repositório (index.html + samples).
name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Re-run no mesmo workflow run deixa 2 artefactos "github-pages"; deploy-pages falha.
      - name: Apagar artefactos Pages anteriores deste run
        uses: GeekyEggo/delete-artifact@v5
        with:
          name: github-pages
          useGlob: "false"
          failOnError: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (sem .git / node_modules)
        run: |
          mkdir site
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' ./ site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
