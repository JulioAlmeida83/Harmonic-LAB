# GitHub Pages — site estático na raiz do repositório (index.html + samples).
name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Re-runs no mesmo run acumulam vários artefactos "github-pages"; deploy-pages exige um só.
      # Apagar via API remove todos (o delete-artifact de terceiros não cobriu todos os casos).
      - name: Apagar todos os artefactos "github-pages" deste run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const collected = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id,
                per_page: 100,
                page,
              });
              collected.push(
                ...data.artifacts.filter((a) => a.name === 'github-pages')
              );
              if (data.artifacts.length < 100) break;
              page += 1;
            }
            for (const art of collected) {
              core.info(`Deleting artifact id=${art.id} name=${art.name}`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: art.id,
              });
            }
            core.info(`Deleted ${collected.length} prior github-pages artifact(s).`);

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (sem .git / node_modules)
        run: |
          mkdir site
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' ./ site/

      - name: Upload artifact
        id: pages_upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
